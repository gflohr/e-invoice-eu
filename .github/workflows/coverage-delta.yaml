name: Coverage Delta

on:
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run tests with coverage (PR)
        run: pnpm run test:cov

      - name: Aggregate coverage (PR)
        run: node aggregate-coverage.mjs

      - name: Save PR coverage
        run: cp coverage-summary.json pr-coverage.json

      - name: Download main coverage
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: Upload Coverage to Coveralls
          branch: main
          name: coverage-main
          path: .

      - name: Compare coverage
        run: |
          node -e "
const fs = require('fs')

const pr = JSON.parse(fs.readFileSync('pr-coverage.json'))
const base = JSON.parse(fs.readFileSync('coverage-summary.json'))

const prPct = pr.total.lines.pct
const basePct = base.total.lines.pct
const delta = prPct - basePct

const out = `PR:   ${prPct.toFixed(2)}%
Base: ${basePct.toFixed(2)}%
Delta: ${delta >= 0 ? '+' : ''}${delta.toFixed(2)}%`

      fs.writeFileSync('coverage-delta.txt', out)
    "

- name: Comment on PR (update existing)
  uses: actions/github-script@v7
  with:
    script: |
      const fs = require('fs')
      const body = "📊 **Coverage Report**\n\n```\n" + fs.readFileSync('coverage-delta.txt', 'utf-8') + "\n```"

      const { data: comments } = await github.rest.issues.listComments({
        issue_number: context.issue.number,
        owner: context.repo.owner,
        repo: context.repo.repo,
      })

      const existing = comments.find(c => c.body.includes("📊 **Coverage Report**"))

      if (existing) {
        await github.rest.issues.updateComment({
          comment_id: existing.id,
          owner: context.repo.owner,
          repo: context.repo.repo,
          body
        })
      } else {
        await github.rest.issues.createComment({
          issue_number: context.issue.number,
          owner: context.repo.owner,
          repo: context.repo.repo,
          body
        })
      }
