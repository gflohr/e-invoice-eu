name: Coverage Delta

on:
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run tests with coverage (PR)
        run: pnpm run test:cov

      - name: Aggregate coverage (PR)
        run: node aggregate-coverage.mjs

      - name: Save PR coverage
        run: cp coverage-summary.json pr-coverage.json

      - name: Download main coverage
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: Upload Coverage to Coveralls
          branch: main
          name: coverage-main
          path: .

      - name: Debug artifact
        run: ls -l

      - name: Compare coverage
        run: node compare-coverage.mjs >coverage-delta.md

      - name: Comment on PR (update existing)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const body = fs.readFileSync('coverage-delta.md', 'utf-8')

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            })

            const existing = comments.find(c => c.body.includes("**Coverage Report**"))

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              })
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              })
            }
