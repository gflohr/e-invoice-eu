name: Docker Publish (DockerHub)

on:
  push:
    branches: ['**']
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Log into DockerHub
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Select platforms
        id: platforms
        run: |
          if [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            echo "platforms=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT
          else
            echo "platforms=linux/amd64" >> $GITHUB_OUTPUT
          fi

      # Extract version (strip leading "v")
      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT


      # -------------------------
      # 🟢 FULL IMAGE
      # -------------------------
      - name: Build and push FULL image
        uses: docker/build-push-action@v5
        with:
          platforms: ${{ steps.platforms.outputs.platforms }}
          context: .
          file: ./apps/server/Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          load: ${{ !startsWith(github.ref, 'refs/tags/') }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -------------------------
      # 🔵 SLIM IMAGE
      # -------------------------
      - name: Build and push SLIM image
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: docker/build-push-action@v5
        with:
          platforms: ${{ steps.platforms.outputs.platforms }}
          context: .
          file: ./apps/server/Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          build-args: WITH_LIBREOFFICE=false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-slim
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:slim
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -------------------------
      # 🔍 SECURITY SCAN (full image)
      # -------------------------
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.33.1
        env:
          TRIVY_SHOW_SUPPRESSED: 'true'
        with:
          version: latest
          image-ref: '${{ env.IMAGE_NAME }}:latest'
          format: 'table'
          exit-code: '1'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          trivyignores: './.trivyignore'

      - name: Re-run Trivy without ignore file
        uses: aquasecurity/trivy-action@0.33.1
        with:
          version: latest
          image-ref: '${{ env.IMAGE_NAME }}:latest'
          format: 'json'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          output: trivy-report.json
          skip-setup-trivy: true
          trivyignores: '/dev/null'

      - name: Check for unnecessary .trivyignore entries
        run: |
          set -euo pipefail
          npx --yes trivy-ignore-check .trivyignore trivy-report.json
        continue-on-error: true
