name: Docker Publish (DockerHub)

on:
  push:
    branches: ['main']
    tags: [ 'v*.*.*' ]
  workflow_dispatch:
    inputs:
      is_latest:
        type: boolean
        required: false
        default: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Log into DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Extract version (strip leading "v")
      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # -------------------------
      # 🟢 FULL IMAGE
      # -------------------------
      - name: Build and push FULL image
        uses: docker/build-push-action@v5
        with:
          platforms: linux/amd64,linux/arm64
          context: .
          file: ./apps/server/Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          build-args: |
            WITH_LIBREOFFICE=true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -------------------------
      # 🔵 SLIM IMAGE
      # -------------------------
      - name: Build and push SLIM image
        uses: docker/build-push-action@v5
        with:
          platforms: linux/amd64,linux/arm64
          context: .
          file: ./apps/server/Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          build-args: |
            WITH_LIBREOFFICE=false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-slim
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:slim
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -------------------------
      # 🔍 SECURITY SCAN (full image)
      # -------------------------
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.29.0
        env:
          TRIVY_SHOW_SUPPRESED: 'true'
        with:
          image-ref: '${{ env.IMAGE_NAME }}:latest'
          format: 'table'
          exit-code: '1'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          trivyignores: './.trivyignore'

      - name: Re-run Trivy without ignore file
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: '${{ env.IMAGE_NAME }}:latest'
          format: 'json'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          output: trivy-report.json

      - name: Check for unnecessary .trivyignore entries
        run: |
          set -euo pipefail
          npx --yes trivy-ignore-check .trivyignore trivy-report.json
        continue-on-error: true
